                thumbClickArea.innerHTML = `<div class="w-full aspect-[1/1.3] bg-white rounded-lg md:rounded-xl shadow-sm flex items-center justify-center overflow-hidden border-[3px] md:border-[4px] transition-all thumb-border border-transparent group-hover:border-ios-blue/40 dark:group-hover:border-ios-darkBlue/50 theme-transition">${content}</div><span class="text-[12px] md:text-[14px] mt-2 md:mt-3 font-bold text-ios-subtext dark:text-gray-400 thumb-text theme-transition">${idx + 1}</span>`;
                
                thumbItem.appendChild(controlUI); 
                thumbItem.appendChild(reorderUI); 
                thumbItem.appendChild(thumbClickArea); 
                container.appendChild(thumbItem);
            });
            highlightThumbnail(activePageIndex); 
            lucide.createIcons();
        }

        function highlightThumbnail(index) {
            const thumbnails = document.getElementById('sidebar-thumbnails').children;
            for (let i = 0; i < thumbnails.length; i++) {
                const bd = thumbnails[i].querySelector('.thumb-border');
                const ts = thumbnails[i].querySelector('.thumb-text'); 
                if(!bd || !ts) continue;

                if (i === index) { 
                    bd.classList.add(isDarkMode ? 'border-ios-darkBlue' : 'border-ios-blue'); 
                    bd.classList.remove('border-transparent', 'group-hover:border-ios-blue/40', 'dark:group-hover:border-ios-darkBlue/50'); 
                    ts.classList.add(isDarkMode ? 'text-ios-darkBlue' : 'text-ios-blue'); 
                    ts.classList.remove('text-ios-subtext', 'dark:text-gray-400'); 
                } else { 
                    bd.classList.remove('border-ios-darkBlue', 'border-ios-blue'); 
                    bd.classList.add('border-transparent', 'group-hover:border-ios-blue/40', 'dark:group-hover:border-ios-darkBlue/50'); 
                    ts.classList.remove('text-ios-darkBlue', 'text-ios-blue'); 
                    ts.classList.add('text-ios-subtext', 'dark:text-gray-400'); 
                }
            }
        }

        function mountCanvasForPage(index, wrapper) {
            const nb = notebooks.find(n => n.id === activeTabId); 
            if (!nb || !nb.pages[index]) return; 
            const page = nb.pages[index];

            wrapper.innerHTML = ''; 
            
            const texture = document.createElement('div'); 
            texture.className = 'absolute inset-0 opacity-[0.05] dark:opacity-[0.03] pointer-events-none z-[5] mix-blend-multiply dark:mix-blend-overlay'; 
            texture.style.backgroundImage = `url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E")`;
            
            const bgCanvas = document.createElement('canvas'); 
            bgCanvas.id = `bg-canvas-${index}`; 
            bgCanvas.className = 'absolute inset-0 w-full h-full z-0 pointer-events-none';

            const drawingCanvas = document.createElement('canvas'); 
            drawingCanvas.id = `drawing-canvas-${index}`; 
            drawingCanvas.className = 'absolute inset-0 w-full h-full z-10 ink-layer pointer-events-none theme-transition';
            
            const activeCanvas = document.createElement('canvas'); 
            activeCanvas.id = `active-canvas-${index}`; 
            let cursorStr = currentTool === 'eraser' ? 'cell' : currentTool === 'pan' ? 'grab' : 'crosshair';
            activeCanvas.className = `absolute inset-0 w-full h-full z-20 cursor-${cursorStr} ink-layer theme-transition`;
            
            bindCanvasEvents(activeCanvas, drawingCanvas, index, wrapper);

            wrapper.appendChild(bgCanvas); 
            wrapper.appendChild(texture); 
            wrapper.appendChild(drawingCanvas); 
            wrapper.appendChild(activeCanvas);

            setupCanvasDimensions(page, bgCanvas, drawingCanvas, activeCanvas); 
            redrawPage(index);
        }

        function unmountCanvasForPage(index, wrapper) {
            if (isDrawing && activePageIndexForDrawing === index) return;
            wrapper.querySelectorAll('canvas').forEach(c => { 
                c.width = 0; 
                c.height = 0; 
            }); 
            wrapper.innerHTML = ''; 
        }

        function buildContinuousDocument() {
            const container = document.getElementById('zoom-wrapper');
            container.innerHTML = '';
            
            const nb = notebooks.find(n => n.id === activeTabId);
            if (!nb) return;

            if (canvasObserver) canvasObserver.disconnect();
            renderedPages.clear();
            
            canvasObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const index = parseInt(entry.target.getAttribute('data-page-index'));
                    if (entry.isIntersecting) {
                        if (!renderedPages.has(index)) {
                            mountCanvasForPage(index, entry.target);
                            renderedPages.add(index);
                        }
                    } else {
                        if (renderedPages.has(index)) {
                            unmountCanvasForPage(index, entry.target);
                            renderedPages.delete(index);
                        }
                    }
                });
            }, { 
                root: document.getElementById('canvas-viewport'), 
                threshold: [0, 0.1], 
                rootMargin: '1000px 0px' 
            });

            nb.pages.forEach((page, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = `page-wrapper relative flex-shrink-0 shadow-page dark:shadow-page-dark ${isPaperDark() ? 'bg-ios-paperDark' : 'bg-white'} overflow-hidden rounded-xl`; 
                wrapper.style.width = `${page.width * zoomLevel}px`;
                wrapper.style.height = `${page.height * zoomLevel}px`;
                wrapper.setAttribute('data-page-index', index);
                wrapper.id = `page-wrapper-${index}`;

                container.appendChild(wrapper);
                canvasObserver.observe(wrapper);
            });
        }

        function setupCanvasDimensions(page, bgCanvas, drawingCanvas, activeCanvas) {
            const dpr = Math.min(window.devicePixelRatio || 2, 2); 
            const w = page.width * dpr;
            const h = page.height * dpr;

            bgCanvas.width = w; 
            bgCanvas.height = h; 
            drawingCanvas.width = w; 
            drawingCanvas.height = h; 
            activeCanvas.width = w; 
            activeCanvas.height = h;

            const bgCtx = bgCanvas.getContext('2d', { alpha: false }); 
            const drawCtx = drawingCanvas.getContext('2d', { willReadFrequently: true }); 
            const actCtx = activeCanvas.getContext('2d', { desynchronized: true }); 
            
            bgCtx.setTransform(1, 0, 0, 1, 0, 0); bgCtx.scale(dpr, dpr); 
            drawCtx.setTransform(1, 0, 0, 1, 0, 0); drawCtx.scale(dpr, dpr); 
            actCtx.setTransform(1, 0, 0, 1, 0, 0); actCtx.scale(dpr, dpr);
        }

        // --- GPU Laser Pointer Engine ---
        function startLaserFadeLoop() {
            if (laserFadeAnimId) return;
            function loop() {
                if (currentTool === 'laser' && activeTabId !== null && view === 'document') {
                    renderedPages.forEach(index => {
                        const ac = document.getElementById(`active-canvas-${index}`);
                        if (ac) {
                            const actCtx = ac.getContext('2d', { desynchronized: true });
                            actCtx.globalCompositeOperation = 'destination-out'; 
                            actCtx.fillStyle = 'rgba(255, 255, 255, 0.08)'; 
                            const dpr = Math.min(window.devicePixelRatio || 2, 2);
                            actCtx.fillRect(0, 0, ac.width/dpr, ac.height/dpr); 
                            actCtx.globalCompositeOperation = 'source-over';
                        }
                    });
                }
                laserFadeAnimId = requestAnimationFrame(loop);
            }
            laserFadeAnimId = requestAnimationFrame(loop);
        }

        // --- Core Render Logic ---
        function redrawPage(index, isExport = false, overrideCtx = null) {
            const nb = notebooks.find(n => n.id === activeTabId); 
            if (!nb) return; 
            const page = nb.pages[index];
            
            let bgCtx, drawCtx;
            if (isExport) { 
                bgCtx = overrideCtx; 
                drawCtx = overrideCtx; 
            } else {
                const bgCanvas = document.getElementById(`bg-canvas-${index}`);
                const drawCanvas = document.getElementById(`drawing-canvas-${index}`);
                if (!bgCanvas || !drawCanvas) return;
                bgCtx = bgCanvas.getContext('2d'); 
                drawCtx = drawCanvas.getContext('2d');
                bgCtx.clearRect(0, 0, page.width, page.height); 
                drawCtx.clearRect(0, 0, page.width, page.height);
            }

            if (isExport) { 
                bgCtx.fillStyle = isPaperDark() ? '#1C1C1E' : '#FFFFFF'; 
                bgCtx.fillRect(0, 0, page.width, page.height); 
            }

            if (page.paperType === 'pdf') {
                const pdfDoc = pdfDocumentCache.get(nb.id);
                if (pdfDoc && !isExport) {
                    pdfDoc.getPage(page.pdfPageIndex).then(pdfPage => {
                        const dpr = Math.min(window.devicePixelRatio || 2, 2); 
                        const rawWidth = pdfPage.getViewport({ scale: 1.0 }).width;
                        const scaleFactor = (page.width / rawWidth) * dpr;
                        const viewport = pdfPage.getViewport({ scale: scaleFactor });
                        
                        bgCtx.save();
                        bgCtx.setTransform(1, 0, 0, 1, 0, 0); 
                        bgCtx.fillStyle = isPaperDark() ? '#1C1C1E' : '#FFFFFF';
                        bgCtx.fillRect(0, 0, page.width * dpr, page.height * dpr);
                        
                        pdfPage.render({ canvasContext: bgCtx, viewport: viewport }).promise.then(() => {
                            bgCtx.restore();
                        });
                    });
                }
            } else if (page.bgImage) {
                const img = new Image(); 
                img.onload = () => { 
                    bgCtx.imageSmoothingEnabled = true; 
                    bgCtx.imageSmoothingQuality = 'high'; 
                    bgCtx.drawImage(img, 0, 0, page.width, page.height); 
                }; 
                img.src = page.bgImage;
            } else { 
                drawPaperTemplate(bgCtx, page.width, page.height, page.paperType, isExport); 
            }

            page.paths.forEach(path => renderPathOnContext(drawCtx, path, isExport));

            // Image Edit Mode Overlay
            if (!isExport && selectedImage && selectedImage.pageIndex === index) {
                const p = page.paths[selectedImage.pathIndex];
                if (p && p.tool === 'image') {
                    drawCtx.save();
                    
                    // Draw Bounding Box
                    drawCtx.strokeStyle = '#0A84FF';
                    drawCtx.lineWidth = 2 / zoomLevel;
                    drawCtx.setLineDash([6 / zoomLevel, 6 / zoomLevel]);
                    drawCtx.strokeRect(p.x, p.y, p.w, p.h);
                    drawCtx.setLineDash([]);
                    
                    const handleRadius = 14 / zoomLevel;

                    // Resize Handle (Bottom-Right)
                    drawCtx.fillStyle = '#FFFFFF';
                    drawCtx.beginPath();
                    drawCtx.arc(p.x + p.w, p.y + p.h, handleRadius, 0, Math.PI*2);
                    drawCtx.fill();
                    drawCtx.stroke();
                    drawCtx.fillStyle = '#0A84FF';
                    drawCtx.beginPath();
                    drawCtx.arc(p.x + p.w, p.y + p.h, handleRadius * 0.5, 0, Math.PI*2);
                    drawCtx.fill();

                    // Delete Handle (Top-Left)
                    drawCtx.fillStyle = '#FF3B30';
                    drawCtx.beginPath();
                    drawCtx.arc(p.x, p.y, handleRadius, 0, Math.PI*2);
                    drawCtx.fill();
                    drawCtx.strokeStyle = '#FFFFFF';
                    drawCtx.lineWidth = 3 / zoomLevel;
                    drawCtx.beginPath();
                    drawCtx.moveTo(p.x - handleRadius*0.4, p.y - handleRadius*0.4);
                    drawCtx.lineTo(p.x + handleRadius*0.4, p.y + handleRadius*0.4);
                    drawCtx.moveTo(p.x + handleRadius*0.4, p.y - handleRadius*0.4);
                    drawCtx.lineTo(p.x - handleRadius*0.4, p.y + handleRadius*0.4);
                    drawCtx.stroke();

                    drawCtx.restore();
                }
            }
        }

        function drawPaperTemplate(ctx, width, height, type, isExport = false) {
            ctx.lineWidth = 0.5; 
            const isDark = isPaperDark() && !isExport;
            
            if (type === 'ruled') {
                ctx.strokeStyle = isDark ? 'rgba(255, 255, 255, 0.1)' : 'rgba(0, 0, 0, 0.12)';
                ctx.beginPath(); 
                for (let y = 80; y < height; y += 40) { 
                    ctx.moveTo(0, Math.floor(y) + 0.5); 
                    ctx.lineTo(width, Math.floor(y) + 0.5); 
                } 
                ctx.stroke();
                ctx.strokeStyle = isDark ? 'rgba(255, 69, 58, 0.3)' : 'rgba(255, 59, 48, 0.4)'; 
                ctx.beginPath(); 
                ctx.moveTo(120.5, 0); 
                ctx.lineTo(120.5, height); 
                ctx.stroke();
            } else if (type === 'grid') {
                ctx.strokeStyle = isDark ? 'rgba(255, 255, 255, 0.06)' : 'rgba(0, 0, 0, 0.08)';
                ctx.beginPath(); 
                for (let x = 30; x < width; x += 30) { 
                    ctx.moveTo(Math.floor(x) + 0.5, 0); 
                    ctx.lineTo(Math.floor(x) + 0.5, height); 
                }
                for (let y = 30; y < height; y += 30) { 
                    ctx.moveTo(0, Math.floor(y) + 0.5); 
                    ctx.lineTo(width, Math.floor(y) + 0.5); 
                } 
                ctx.stroke();
            } else if (type === 'dotted') {
                ctx.fillStyle = isDark ? 'rgba(255, 255, 255, 0.15)' : 'rgba(0, 0, 0, 0.2)';
                for (let x = 30; x < width; x += 30) { 
                    for (let y = 30; y < height; y += 30) { 
                        ctx.beginPath(); 
                        ctx.arc(Math.floor(x) + 0.5, Math.floor(y) + 0.5, 1, 0, Math.PI * 2); 
                        ctx.fill(); 
                    } 
                }
            }
        }

        function renderPathOnContext(ctx, path, isExport = false) {
            if (path.tool === 'image') {
                const img = new Image(); 
                img.src = path.src;
                if (img.complete) {
                    ctx.drawImage(img, path.x, path.y, path.w, path.h);
                } else {
                    img.onload = () => ctx.drawImage(img, path.x, path.y, path.w, path.h);
                }
                return;
            }

            let renderColor = path.color;
            if (!isExport && isPaperDark() && path.color.toUpperCase() === '#1C1C1E' && path.tool !== 'highlighter') {
                renderColor = '#FFFFFF';
            }

            if (!path.points || path.points.length === 0) return;
            ctx.lineCap = 'round'; 
            ctx.lineJoin = 'round';

            if (path.tool === 'highlighter') {
                ctx.globalCompositeOperation = 'source-over'; 
                ctx.globalAlpha = 0.5; 
                ctx.strokeStyle = renderColor; 
                ctx.lineWidth = path.width;
                
                ctx.beginPath(); 
                ctx.moveTo(path.points[0].x, path.points[0].y);
                if (path.points.length > 2) {
                    for (let i = 1; i < path.points.length - 1; i++) {
                        const xc = (path.points[i].x + path.points[i+1].x) / 2;
                        const yc = (path.points[i].y + path.points[i+1].y) / 2;
                        ctx.quadraticCurveTo(path.points[i].x, path.points[i].y, xc, yc);
                    }
                    ctx.lineTo(path.points[path.points.length - 1].x, path.points[path.points.length - 1].y);
                } else if(path.points.length === 2) {
                    ctx.lineTo(path.points[1].x, path.points[1].y); 
                } else {
                    ctx.lineTo(path.points[0].x + 0.1, path.points[0].y);
                }
                ctx.stroke();
            } else if (path.tool === 'eraser') {
                if (isExport) { 
                    ctx.globalCompositeOperation = 'source-over'; 
                    ctx.strokeStyle = '#FFFFFF'; 
                } else { 
                    ctx.globalCompositeOperation = 'destination-out'; 
                }
                ctx.globalAlpha = 1.0; 
                ctx.lineWidth = path.width; 
                
                ctx.beginPath(); 
                ctx.moveTo(path.points[0].x, path.points[0].y);
                for (let i = 1; i < path.points.length; i++) {
                    ctx.lineTo(path.points[i].x, path.points[i].y); 
                }
                ctx.stroke();
            } else {
                ctx.globalCompositeOperation = 'source-over'; 
                ctx.globalAlpha = 1.0; 
                ctx.strokeStyle = renderColor;
                
                if (path.points.length === 1) { 
                    ctx.beginPath(); 
                    ctx.arc(path.points[0].x, path.points[0].y, path.width / 2, 0, Math.PI * 2); 
                    ctx.fillStyle = renderColor; 
                    ctx.fill(); 
                    return; 
                }
                if (path.points.length > 2) {
                    ctx.beginPath(); 
                    ctx.moveTo(path.points[0].x, path.points[0].y);
                    for (let i = 1; i < path.points.length - 1; i++) {
                        const xc = (path.points[i].x + path.points[i+1].x) / 2;
                        const yc = (path.points[i].y + path.points[i+1].y) / 2;
                        ctx.quadraticCurveTo(path.points[i].x, path.points[i].y, xc, yc);
                        ctx.lineWidth = path.width * (0.2 + ((path.points[i].pressure || 0.5) * 1.8)); 
                        ctx.stroke();
                        ctx.beginPath(); 
                        ctx.moveTo(xc, yc);
                    }
                    ctx.lineTo(path.points[path.points.length-1].x, path.points[path.points.length-1].y); 
                    ctx.stroke();
                } else {
                    ctx.beginPath(); 
                    ctx.moveTo(path.points[0].x, path.points[0].y); 
                    ctx.lineTo(path.points[1].x, path.points[1].y);
                    ctx.lineWidth = path.width * (0.2 + ((path.points[1].pressure || 0.5) * 1.8)); 
                    ctx.stroke();
                }
            }
        }

        // --- Event Binding ---
        function getPathAtLocation(page, logicalX, logicalY) {
            for (let i = page.paths.length - 1; i >= 0; i--) {
                const p = page.paths[i];
                if (p.tool === 'image') {
                    if (logicalX >= p.x && logicalX <= p.x + p.w && logicalY >= p.y && logicalY <= p.y + p.h) return i;
                } 
            }
            return -1;
        }

        function getCoordinates(e, canvas) {
            const rect = canvas.getBoundingClientRect(), dpr = Math.min(window.devicePixelRatio || 2, 2);
            return { 
                x: (e.clientX - rect.left) * ((canvas.width / dpr) / rect.width), 
                y: (e.clientY - rect.top) * ((canvas.height / dpr) / rect.height), 
                pressure: e.pointerType === 'pen' ? e.pressure : null, 
                timestamp: e.timeStamp 
            };
        }

        function snapToShape() {
            if (strokePoints.length < 10) return;
            
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            strokePoints.forEach(p => { 
                if (p.x < minX) minX = p.x; 
                if (p.x > maxX) maxX = p.x; 
                if (p.y < minY) minY = p.y; 
                if (p.y > maxY) maxY = p.y; 
            });
            
            const w = maxX - minX, h = maxY - minY;
            const start = strokePoints[0], end = strokePoints[strokePoints.length - 1];
            
            let newPoints = [];
            if (Math.hypot(start.x - end.x, start.y - end.y) < Math.max(w, h) * 0.4) {
                const cx = minX + w / 2, cy = minY + h / 2, steps = 60;
                for (let i = 0; i <= steps; i++) { 
                    const a = (i / steps) * Math.PI * 2; 
                    newPoints.push({ x: cx + (w / 2) * Math.cos(a), y: cy + (h / 2) * Math.sin(a), pressure: 0.6 }); 
                }
                showToast("Perfect Ellipse", "circle"); 
                if (navigator.vibrate) navigator.vibrate(50);
            } else {
                newPoints = [start, end]; 
                showToast("Perfect Line", "minus"); 
                if (navigator.vibrate) navigator.vibrate(50);
            }
            
            strokePoints = newPoints;
            const actCtx = currentActiveCanvas.getContext('2d', { desynchronized: true });
            actCtx.clearRect(0, 0, currentActiveCanvas.width / Math.min(window.devicePixelRatio || 2, 2), currentActiveCanvas.height / Math.min(window.devicePixelRatio || 2, 2));
            renderPathOnContext(actCtx, { tool: currentTool, color: activeColor, width: activeSize, points: strokePoints });
        }

        function bindCanvasEvents(activeCanvas, drawingCanvas, pageIndex, wrapper) {
            
            activeCanvas.addEventListener('touchstart', (e) => {
                if (currentTool === 'pan') return; 

                if (e.touches.length >= 2) {
                    touchStartFingers = e.touches.length;
                    touchStartTime = Date.now();
                    gestureHandled = false;
                    
                    if (isDrawing) {
                        isDrawing = false;
                        strokePoints = [];
                        const actCtx = activeCanvas.getContext('2d');
                        actCtx.clearRect(0, 0, activeCanvas.width, activeCanvas.height);
                    }
                    return; 
                }
                preventScrollIfDrawing(e);
            }, { passive: false });

            activeCanvas.addEventListener('touchmove', (e) => {
                if (currentTool === 'pan') return; 
                if (e.touches.length >= 2) return; 
                preventScrollIfDrawing(e);
            }, { passive: false });
            
            activeCanvas.addEventListener('touchend', (e) => {
                if (currentTool === 'pan') return; 
                if (!gestureHandled && touchStartFingers >= 2) {
                    const duration = Date.now() - touchStartTime;
                    if (duration < 400 && e.touches.length === 0) { 
                        if (touchStartFingers === 2) window.undoLastStroke();
                        if (touchStartFingers === 3) window.redoLastStroke();
                        gestureHandled = true;
                    }
                }
                if (e.touches.length === 0) touchStartFingers = 0;
            });

            wrapper.addEventListener('pointerdown', (e) => {
                const rect = activeCanvas.getBoundingClientRect();
                const rawX = e.clientX - rect.left, rawY = e.clientY - rect.top;
                const x = rawX / zoomLevel, y = rawY / zoomLevel;

                const nb = notebooks.find(n => n.id === activeTabId);
                const page = nb.pages[pageIndex];
                const hitIdx = getPathAtLocation(page, x, y);

                if (hitIdx !== -1 && currentTool === 'eraser') {
                    page.paths.splice(hitIdx, 1);
                    saveNotebook(nb);
                    redrawPage(pageIndex);
                    updateUndoRedoUI();
                    if(navigator.vibrate) navigator.vibrate(50);
                    return;
                }
                
                if (currentTool === 'pan') {
                    if (touchStartFingers >= 2) return;

                    if (selectedImage && selectedImage.pageIndex === pageIndex) {
                        const p = page.paths[selectedImage.pathIndex];
                        if (p) {
                            // Check delete (top-left)
                            if (Math.hypot(x - p.x, y - p.y) < 30 / zoomLevel) {
                                page.paths.splice(selectedImage.pathIndex, 1);
                                selectedImage = null;
                                saveNotebook(nb);
                                redrawPage(pageIndex);
                                updateUndoRedoUI();
                                if(navigator.vibrate) navigator.vibrate(50);
                                return;
                            }
                            // Check resize (bottom-right)
                            if (Math.hypot(x - (p.x + p.w), y - (p.y + p.h)) < 30 / zoomLevel) {
                                imageAction = 'resize';
                                actionState = { startX: x, startY: y, origW: p.w, origH: p.h, origX: p.x, origY: p.y };
                                document.getElementById('canvas-viewport').style.overflow = 'hidden';
                                return;
                            }
                            // Check drag (inside)
                            if (x >= p.x && x <= p.x + p.w && y >= p.y && y <= p.y + p.h) {
                                imageAction = 'drag';
                                actionState = { startX: x, startY: y, origX: p.x, origY: p.y };
                                document.getElementById('canvas-viewport').style.overflow = 'hidden';
                                return;
                            }
                        }
                    }

                    // Tapped a new image?
                    if (hitIdx !== -1) {
                        selectedImage = { pageIndex, pathIndex: hitIdx };
                        imageAction = 'drag'; 
                        const p = page.paths[hitIdx];
                        actionState = { startX: x, startY: y, origX: p.x, origY: p.y };
                        document.getElementById('canvas-viewport').style.overflow = 'hidden';
                        redrawPage(pageIndex);
                        return;
                    } else if (selectedImage) {
                        // Tapped empty space, deselect
                        selectedImage = null;
                        redrawPage(pageIndex);
                    }
                    return; // Allow native scroll
                }
            });

            let renderQueue = false;

            activeCanvas.addEventListener('pointerdown', (e) => {
                if (currentTool === 'pan') return; 
                if (touchStartFingers >= 2) return;
                if (stylusOnlyMode && e.pointerType !== 'pen') return; 
                if (e.pointerType === 'mouse' && e.button !== 0) return;
                
                isDrawing = true;
                setSyncing(true); 

                currentActiveCanvas = activeCanvas;
                currentDrawingCanvas = drawingCanvas;
                activePageIndexForDrawing = pageIndex;
                strokePoints = [];
                hasSnapped = false;
                clearTimeout(shapeSnapTimeout);
                
                const coords = getCoordinates(e, activeCanvas);
                if (coords.pressure === null) coords.pressure = 0.5; 
                
                lastPoint = coords;
                lastPressure = coords.pressure; 
                strokePoints.push(coords);

                const actCtx = activeCanvas.getContext('2d', { desynchronized: true });
                if (currentTool !== 'laser') actCtx.clearRect(0, 0, activeCanvas.width, activeCanvas.height);

                if (currentTool === 'eraser') {
                    const drawCtx = drawingCanvas.getContext('2d');
                    drawCtx.globalCompositeOperation = 'destination-out';
                    drawCtx.beginPath();
                    drawCtx.arc(coords.x, coords.y, activeSize / 2, 0, Math.PI * 2);
                    drawCtx.fill();
                }
            });

            const processPointerMove = (e) => {
                const coords = getCoordinates(e, activeCanvas);
                const x = coords.x, y = coords.y;

                if (currentTool === 'pan' && selectedImage && imageAction && actionState) {
                    const nb = notebooks.find(n => n.id === activeTabId);
                    const page = nb.pages[pageIndex];
                    const p = page.paths[selectedImage.pathIndex];
                    
                    if (imageAction === 'drag') {
                        p.x = actionState.origX + (x - actionState.startX);
                        p.y = actionState.origY + (y - actionState.startY);
                    } else if (imageAction === 'resize') {
                        const dx = x - actionState.startX;
                        const aspect = actionState.origW / actionState.origH;
                        const newW = Math.max(40, actionState.origW + dx);
                        const newH = newW / aspect;
                        p.w = newW;
                        p.h = newH;
                    }

                    if (!renderQueue) {
                        renderQueue = true;
                        requestAnimationFrame(() => {
                            redrawPage(pageIndex);
                            renderQueue = false;
                        });
                    }
                    return;
                }

                if (!lastPoint || !isDrawing) return;
                
                const dist = Math.hypot(coords.x - lastPoint.x, coords.y - lastPoint.y);
                if (dist < (0.5 / zoomLevel)) return;

                if (currentTool === 'pen' && !hasSnapped) {
                    clearTimeout(shapeSnapTimeout);
                    shapeSnapTimeout = setTimeout(() => {
                        if (isDrawing) {
                            snapToShape();
                            hasSnapped = true; 
                        }
                    }, 500); 
                }

                if (hasSnapped) return; 

                if (coords.pressure === null) {
                    const timeDelta = coords.timestamp - lastPoint.timestamp;
                    const velocity = dist / Math.max(timeDelta, 1);
                    const targetPressure = Math.max(0.1, 1.0 - (velocity * 0.4));
                    coords.pressure = (lastPressure * 0.7) + (targetPressure * 0.3);
                } else {
                    coords.pressure = (lastPressure * 0.6) + (coords.pressure * 0.4);
                }

                lastPressure = coords.pressure;
                strokePoints.push(coords);

                if (!renderQueue) {
                    renderQueue = true;
                    requestAnimationFrame(() => {
                        if (currentTool === 'eraser') {
                            const drawCtx = currentDrawingCanvas.getContext('2d');
                            drawCtx.globalCompositeOperation = 'destination-out';
                            drawCtx.lineWidth = activeSize;
                            drawCtx.lineCap = 'round'; drawCtx.lineJoin = 'round';
                            drawCtx.beginPath();
                            drawCtx.moveTo(lastPoint.x, lastPoint.y);
                            drawCtx.lineTo(coords.x, coords.y);
                            drawCtx.stroke();
                        } else {
                            const actCtx = activeCanvas.getContext('2d', { desynchronized: true });
                            const physicalWidth = activeCanvas.width / (Math.min(window.devicePixelRatio || 2, 2));
                            const physicalHeight = activeCanvas.height / (Math.min(window.devicePixelRatio || 2, 2));
                            
                            if (currentTool !== 'laser') actCtx.clearRect(0, 0, physicalWidth, physicalHeight);

                            if (currentTool === 'line') {
                                renderPathOnContext(actCtx, { tool: 'pen', color: activeColor, width: activeSize, points: [strokePoints[0], coords] });
                            } else if (currentTool === 'laser') {
                                actCtx.shadowColor = activeColor;
                                actCtx.shadowBlur = 16;
                                renderPathOnContext(actCtx, { tool: 'pen', color: activeColor, width: activeSize, points: [lastPoint, coords] });
                                actCtx.shadowBlur = 0;
                            } else {
                                renderPathOnContext(actCtx, { tool: currentTool, color: activeColor, width: activeSize, points: strokePoints });
                            }
                        }
                        renderQueue = false;
                        lastPoint = coords;
                    });
                } else {
                     lastPoint = coords;
                }
            };

            activeCanvas.addEventListener('pointermove', (e) => {
                if (currentTool === 'pan' && !imageAction) return; 
                if (touchStartFingers >= 2) return;
                if (stylusOnlyMode && e.pointerType !== 'pen' && currentTool !== 'pan') return;
                if (!isDrawing && currentTool !== 'pan') return;
                
                if (e.getCoalescedEvents) {
                    for (let event of e.getCoalescedEvents()) {
                        processPointerMove(event);
                    }
                } else {
                    processPointerMove(e);
                }
            });

            const stopHandler = (e) => {
                if (currentTool === 'pan' && imageAction) {
                    const nb = notebooks.find(n => n.id === activeTabId);
                    saveNotebook(nb);
                    imageAction = null; 
                    actionState = null;
                    document.getElementById('canvas-viewport').style.overflow = 'auto';
                    updateUndoRedoUI();
                    return;
                }

                if (currentTool === 'pan') return; 
                if (stylusOnlyMode && e && e.pointerType !== 'pen') return;
                if (!isDrawing || currentActiveCanvas !== activeCanvas) return;
                
                isDrawing = false;
                clearTimeout(shapeSnapTimeout);
                
                if (strokePoints.length > 0 && currentTool !== 'laser') {
                    let finalPoints = strokePoints;
                    if (currentTool === 'line') {
                        finalPoints = [strokePoints[0], strokePoints[strokePoints.length - 1]];
                    }
                    
                    const pathTool = (currentTool === 'line') ? 'pen' : currentTool;
                    const pathObj = { tool: pathTool, color: activeColor, width: activeSize, points: finalPoints };
                    
                    const nb = notebooks.find(n => n.id === activeTabId);
                    if (nb && nb.pages[activePageIndexForDrawing]) {
                        nb.pages[activePageIndexForDrawing].paths.push(pathObj);
                        nb.pages[activePageIndexForDrawing].redoPaths = []; 
                    }
                    
                    if (currentTool !== 'eraser') {
                        const drawCtx = currentDrawingCanvas.getContext('2d');
                        renderPathOnContext(drawCtx, pathObj);
                    }
                    
                    saveNotebook(nb);
                } else {
                    setSyncing(false);
                }
                
                if (currentTool !== 'laser') {
                    const actCtx = activeCanvas.getContext('2d');
                    const physicalWidth = activeCanvas.width / (Math.min(window.devicePixelRatio || 2, 2));
                    const physicalHeight = activeCanvas.height / (Math.min(window.devicePixelRatio || 2, 2));
                    actCtx.clearRect(0, 0, physicalWidth, physicalHeight);
                }

                strokePoints = [];
                currentActiveCanvas = null;
                currentDrawingCanvas = null;
                activePageIndexForDrawing = null;
                updateUndoRedoUI();
            };

            activeCanvas.addEventListener('pointerup', stopHandler);
            activeCanvas.addEventListener('pointerout', stopHandler);
            activeCanvas.addEventListener('pointercancel', stopHandler);
        }

        // --- Export Engine ---
        function exportCurrentPagePNG() {
            const nb = notebooks.find(n => n.id === activeTabId);
            if (!nb) return;
            const currentIndex = getCurrentPageIndex();
            const page = nb.pages[currentIndex];
            if (!page) return;

            showLoading("Exporting Image", "Generating PNG...");
            
            setTimeout(() => {
                const exportCanvas = document.createElement('canvas');
                exportCanvas.width = page.width * 2; 
                exportCanvas.height = page.height * 2;
                const ctx = exportCanvas.getContext('2d');
                ctx.scale(2, 2);

                redrawPage(currentIndex, true, ctx); 

                const link = document.createElement('a');
                link.download = `${nb.title}_Page_${currentIndex + 1}.png`;
                link.href = exportCanvas.toDataURL('image/png', 1.0);
                link.click();
                
                hideLoading();
                closeExportMenu();
            }, 500);
        }

        async function exportToPDF() {
            const nb = notebooks.find(n => n.id === activeTabId);
            if (!nb) return;

            showLoading("Exporting PDF", "Rebuilding document...");

            try {
                const firstPage = nb.pages[0];
                const orientation = firstPage.width > firstPage.height ? 'l' : 'p';
                const pdfOut = new jsPDF({ unit: 'px', format: [firstPage.width, firstPage.height], orientation });

                for (let i = 0; i < nb.pages.length; i++) {
                    const page = nb.pages[i];
                    const subEl = document.getElementById('loading-subtext');
                    if(subEl) subEl.innerText = `Merging ink on page ${i + 1} of ${nb.pages.length}`;
                    
                    await new Promise(resolve => requestAnimationFrame(resolve));
                    if (i > 0) pdfOut.addPage([page.width, page.height], page.width > page.height ? 'l' : 'p');

                    const tempCanvas = document.createElement('canvas');
                    tempCanvas.width = page.width;
                    tempCanvas.height = page.height;
                    const ctx = tempCanvas.getContext('2d');

                    // FORCE WHITE BACKGROUND FOR PDF EXPORT REGARDLESS OF DARK MODE
                    ctx.fillStyle = '#FFFFFF';
                    ctx.fillRect(0, 0, page.width, page.height);

                    if (page.paperType === 'pdf') {
                        const originalPdf = pdfDocumentCache.get(nb.id);
                        if(originalPdf) {
                            const pdfPage = await originalPdf.getPage(page.pdfPageIndex);
                            const rawWidth = pdfPage.getViewport({ scale: 1.0 }).width;
                            const scaleFactor = page.width / rawWidth;
                            const viewport = pdfPage.getViewport({ scale: scaleFactor });
                            
                            await pdfPage.render({ canvasContext: ctx, viewport: viewport }).promise;
                        }
                    } else if (page.bgImage) {
                        const img = new Image();
                        img.src = page.bgImage;
                        await new Promise(resolve => { img.onload = resolve; });
                        ctx.drawImage(img, 0, 0, page.width, page.height);
                    } else {
                        drawPaperTemplate(ctx, page.width, page.height, page.paperType, true); 
                    }

                    // For export, manually multiply composite the ink
                    ctx.globalCompositeOperation = 'multiply';
                    
                    // Preload all images before drawing paths
                    for (const path of page.paths) {
                        if (path.tool === 'image') {
                            await new Promise(resolve => {
                                const img = new Image();
                                img.onload = () => { ctx.drawImage(img, path.x, path.y, path.w, path.h); resolve(); };
                                img.onerror = resolve;
                                img.src = path.src;
                            });
                        } else {
                            renderPathOnContext(ctx, path, true);
                        }
                    }

                    const imgData = tempCanvas.toDataURL('image/jpeg', 0.85); 
                    pdfOut.addImage(imgData, 'JPEG', 0, 0, page.width, page.height);
                }
                pdfOut.save(`${nb.title}.pdf`);
            } catch (err) {
                console.error("PDF Export Error:", err);
                showModal("Export Failed", "An error occurred while building your PDF file.", "OK", false, ()=>{});
            } finally {
                hideLoading();
                closeExportMenu();
            }
        }

        function exportNativeBackup() {
            const nb = notebooks.find(n => n.id === activeTabId);
            if (!nb) return;
            
            showLoading("Creating Backup", "Packaging editable data...");

            setTimeout(() => {
                const dataStr = JSON.stringify(nb);
                const blob = new Blob([dataStr], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                
                const link = document.createElement('a');
                link.download = `${nb.title}.gn`;
                link.href = url;
                link.click();
                
                URL.revokeObjectURL(url);
                hideLoading();
                closeExportMenu();
            }, 500);
        }

        window.addEventListener('keydown', (e) => {
            if (view !== 'document') return; 
            
            if ((e.metaKey || e.ctrlKey) && !e.shiftKey && e.key === 'z') { e.preventDefault(); window.undoLastStroke(); }
            if ((e.metaKey || e.ctrlKey) && e.shiftKey && e.key === 'z') { e.preventDefault(); window.redoLastStroke(); }
            if ((e.metaKey || e.ctrlKey) && e.key === 'y') { e.preventDefault(); window.redoLastStroke(); }
            if (!e.metaKey && !e.ctrlKey) {
                if (e.key.toLowerCase() === 'v') window.setTool('pan');
                if (e.key.toLowerCase() === 'p') window.setTool('pen');
                if (e.key.toLowerCase() === 'h') window.setTool('highlighter');
                if (e.key.toLowerCase() === 'l') window.setTool('line');
                if (e.key.toLowerCase() === 'e') window.setTool('eraser');
            }
        });

        // Publish to global scope for HTML inline handlers
        Object.assign(window, {
            toggleTheme, isPaperDark, togglePageTheme, setView, toggleSidebar, toggleFullscreen, toggleFocusMode,
            setLibraryFilter, renderLibrary, toggleFavorite, moveToTrash, restoreNotebook, openNotebook, requestNewNotebook,
            requestRenameNotebook, requestDeleteNotebook, requestDeletePage, duplicatePage, movePageUp, movePageDown,
            requestClearCurrentPage, requestAddPage, addBlankPage, changePageTemplate, updateUndoRedoUI, undoLastStroke,
            redoLastStroke, toggleStylusMode, updateStylusModeUI, preventScrollIfDrawing, adjustZoom, setZoom, setTool,
            setupColorPicker, updateToolbar, updateDocumentUI, renderSidebarThumbnails, highlightThumbnail, mountCanvasForPage,
            unmountCanvasForPage, buildContinuousDocument, setupCanvasDimensions, startLaserFadeLoop, redrawPage,
            drawPaperTemplate, renderPathOnContext, getPathAtLocation, getCoordinates, snapToShape, bindCanvasEvents,
            exportCurrentPagePNG, exportToPDF, exportNativeBackup, handleImageInsert, handlePdfUpload,
            showToast, showModal, closeModal, showLoading, hideLoading, openExportMenu, closeExportMenu, openPageSettingsModal,
            closePageSettingsModal, handleFileUpload
        });

        document.addEventListener('DOMContentLoaded', init);
    </script>
