<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- Native iPadOS App Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GreatNotes">
    <meta name="theme-color" content="#F2F2F7" id="meta-theme-color">
    
    <!-- Hardcoded Native iOS PWA Icons -->
    <link rel="apple-touch-icon" href="data:image/svg+xml;charset=utf-8,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='512' height='512' fill='%230A84FF' rx='112'/%3E%3Cg transform='translate(256,256) rotate(-6) translate(-256,-256)'%3E%3Crect x='110' y='90' width='292' height='370' rx='20' fill='%23FFF' opacity='0.9'/%3E%3C/g%3E%3Cg transform='translate(256,256) rotate(4) translate(-256,-256)'%3E%3Crect x='110' y='90' width='292' height='370' rx='20' fill='%23FFF'/%3E%3Cpath d='M160 160h200m-200 60h200m-200 60h200m-200 60h200' stroke='%230A84FF' stroke-width='24' stroke-linecap='round' opacity='0.3'/%3E%3C/g%3E%3C/svg%3E">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;charset=utf-8,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='512' height='512' fill='%230A84FF' rx='112'/%3E%3Cg transform='translate(256,256) rotate(-6) translate(-256,-256)'%3E%3Crect x='110' y='90' width='292' height='370' rx='20' fill='%23FFF' opacity='0.9'/%3E%3C/g%3E%3Cg transform='translate(256,256) rotate(4) translate(-256,-256)'%3E%3Crect x='110' y='90' width='292' height='370' rx='20' fill='%23FFF'/%3E%3Cpath d='M160 160h200m-200 60h200m-200 60h200m-200 60h200' stroke='%230A84FF' stroke-width='24' stroke-linecap='round' opacity='0.3'/%3E%3C/g%3E%3C/svg%3E">
    
    <title>GreatNotes - Ultimate Edition</title>
    
    <!-- Tailwind CSS with Premium Configuration -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['-apple-system', 'BlinkMacSystemFont', '"SF Pro Display"', '"Segoe UI"', 'Roboto', 'sans-serif'] },
                    colors: {
                        ios: {
                            blue: '#0A84FF', darkBlue: '#0A84FF', bg: '#F2F2F7', darkBg: '#000000', text: '#1C1C1E', darkText: '#FFFFFF', subtext: '#8E8E93', darkSubtext: '#98989D', paperDark: '#1C1C1E'
                        }
                    },
                    boxShadow: {
                        'liquid': '0 16px 40px rgba(0, 0, 0, 0.08), inset 0 1px 1.5px rgba(255, 255, 255, 0.9), inset 0 -1px 1.5px rgba(0, 0, 0, 0.05), 0 0 0 1px rgba(255,255,255,0.4)',
                        'liquid-dark': '0 16px 40px rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(255, 255, 255, 0.15), inset 0 -1px 1px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(255,255,255,0.05)',
                        'page': '0 0 0 1px rgba(0,0,0,0.02), 0 8px 24px -4px rgba(0,0,0,0.08), 0 24px 48px -12px rgba(0,0,0,0.15)',
                        'page-dark': '0 0 0 1px rgba(255,255,255,0.1), 0 8px 24px -4px rgba(0,0,0,0.5), 0 32px 64px -12px rgba(0,0,0,0.9)'
                    }
                }
            }
        }
    </script>
    
    <!-- External Pro Libraries -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        /* Base Native iPad Behaviors */
        :root { -webkit-tap-highlight-color: transparent; }
        body { overscroll-behavior-y: none; -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; background-color: transparent; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* THEME CROSS-FADE ENGINE */
        .theme-transition { transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease; }
        .app-bg-layer { position: fixed; inset: 0; z-index: -1; transition: opacity 0.4s ease; }
        .bg-light-layer { background-color: #F2F2F7; background-image: radial-gradient(rgba(0,0,0,0.04) 1px, transparent 1px); background-size: 24px 24px; opacity: 1; }
        .dark .bg-light-layer { opacity: 0; }
        .bg-dark-layer { background-color: #000000; background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px); background-size: 24px 24px; opacity: 0; }
        .dark .bg-dark-layer { opacity: 1; }

        /* VISION-OS PREMIUM LIQUID GLASS */
        .liquid-glass { background: rgba(255, 255, 255, 0.65); backdrop-filter: blur(50px) saturate(300%); -webkit-backdrop-filter: blur(50px) saturate(300%); box-shadow: var(--tw-shadow-liquid); transform: translateZ(0); will-change: transform, backdrop-filter; }
        .dark .liquid-glass { background: rgba(25, 25, 25, 0.55); box-shadow: var(--tw-shadow-liquid-dark); }
        .liquid-glass-heavy { background: rgba(245, 245, 247, 0.85); backdrop-filter: blur(60px) saturate(300%); -webkit-backdrop-filter: blur(60px) saturate(300%); transform: translateZ(0); }
        .dark .liquid-glass-heavy { background: rgba(28, 28, 30, 0.85); }

        /* BUTTER-SMOOTH ANIMATIONS & PHYSICS */
        .spring-btn { transition: transform 0.2s cubic-bezier(0.25, 1, 0.5, 1), background-color 0.2s ease, opacity 0.2s ease, color 0.2s ease; transform-origin: center; }
        .spring-btn:active:not(:disabled) { transform: scale(0.92) translateZ(0); }
        .spatial-transition { transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1), filter 0.5s cubic-bezier(0.32, 0.72, 0, 1), opacity 0.5s cubic-bezier(0.32, 0.72, 0, 1); will-change: transform, filter, opacity; transform-style: preserve-3d; }
        .book-cover { transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.4s ease; transform-style: preserve-3d; box-shadow: 0 0 0 1px rgba(0,0,0,0.02), 0 8px 24px -4px rgba(0,0,0,0.08), 0 24px 48px -12px rgba(0,0,0,0.15); }
        .dark .book-cover { box-shadow: 0 0 0 1px rgba(255,255,255,0.1), 0 8px 24px -4px rgba(0,0,0,0.5), 0 32px 64px -12px rgba(0,0,0,0.9); }
        .group:active .book-cover { transform: scale(0.95) perspective(1200px) rotateX(3deg) translateY(2px) translateZ(0) !important; box-shadow: 0 4px 15px rgba(0,0,0,0.15) !important; }
        .book-spine { position: absolute; left: 0; top: 0; bottom: 0; width: 28px; background: linear-gradient(90deg, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0.05) 20%, rgba(0,0,0,0.1) 40%, rgba(255,255,255,0.1) 80%, rgba(0,0,0,0.2) 100%); border-right: 1px solid rgba(0,0,0,0.1); mix-blend-mode: overlay; z-index: 10; pointer-events: none; }

        /* Active Tool Styling */
        .tool-btn { position: relative; transition: all 0.2s ease; }
        .tool-btn.active { transform: translateY(-4px) translateZ(0); background-color: #0A84FF !important; color: white !important; box-shadow: 0 4px 12px rgba(10,132,255,0.3); border-radius: 24px; }
        .dark .tool-btn.active { background-color: #0A84FF !important; color: white !important; box-shadow: 0 4px 12px rgba(10,132,255,0.6); }

        .overlay { display: none; backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%); z-index: 10000; }
        .overlay.active { display: flex; }

        #canvas-viewport { scroll-behavior: smooth; touch-action: pan-x pan-y; }
        
        /* OPTIMIZED PAGE WRAPPER: Removed transition width/height to eliminate pinch jitter */
        .page-wrapper { transform: translateZ(0); will-change: width, height; transition: background-color 0.4s ease; }
        
        /* HARDWARE ACCELERATION & PALM REJECTION */
        .ink-layer { mix-blend-mode: multiply; touch-action: none !important; -webkit-user-drag: none; }
        .dark .ink-layer { mix-blend-mode: normal; } 

        /* GLOBAL DRAG & DROP ZONE */
        #global-dropzone { display: none; backdrop-filter: blur(30px) saturate(200%); -webkit-backdrop-filter: blur(30px) saturate(200%); z-index: 9999; }
        #global-dropzone.drag-active { display: flex; }
        
        .sync-dot { width: 6px; height: 6px; border-radius: 50%; background-color: currentColor; display: inline-block; }
        .syncing .sync-dot { animation: pulse 1s infinite alternate; }
        @keyframes pulse { 0% { opacity: 0.3; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1.2); } }
    </style>
</head>
<body class="overflow-hidden text-ios-text dark:text-ios-darkText antialiased w-full h-full flex font-sans relative theme-transition">

    <!-- Background Engine -->
    <div class="app-bg-layer bg-light-layer"></div>
    <div class="app-bg-layer bg-dark-layer"></div>

    <!-- Hidden Unified Upload Input (SINGLE INSTANCE) -->
    <input type="file" id="general-upload" accept="application/pdf,image/*,.gn" class="hidden" onchange="window.handleFileUpload(event)">

    <!-- Drag & Drop Overlay -->
    <div id="global-dropzone" class="absolute inset-0 bg-ios-blue/10 dark:bg-ios-blue/20 flex-col items-center justify-center border-[6px] border-dashed border-ios-blue m-4 rounded-[40px] pointer-events-none transition-all duration-300">
        <div class="bg-white/90 dark:bg-black/80 p-8 rounded-3xl shadow-2xl flex flex-col items-center theme-transition">
            <i data-lucide="download-cloud" class="w-16 h-16 text-ios-blue mb-4"></i>
            <h2 class="text-3xl font-extrabold text-ios-text dark:text-white theme-transition">Drop to Insert</h2>
            <p class="text-ios-subtext font-medium mt-2 theme-transition">Supports PDF, Image, or .gn Backups</p>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="overlay fixed inset-0 bg-white/50 dark:bg-black/70 flex-col items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="liquid-glass p-8 md:p-10 rounded-[32px] flex flex-col items-center transform transition-transform duration-300 scale-90" id="loading-content">
            <div class="relative w-16 h-16 md:w-20 md:h-20 mb-6 flex items-center justify-center">
                <div class="absolute inset-0 border-[5px] md:border-[6px] border-ios-blue/10 dark:border-ios-darkBlue/20 rounded-full theme-transition"></div>
                <div class="absolute inset-0 border-[5px] md:border-[6px] border-t-ios-blue dark:border-t-ios-darkBlue rounded-full animate-spin theme-transition" style="animation-duration: 0.8s;"></div>
                <i data-lucide="file-text" class="w-7 h-7 md:w-8 md:h-8 text-ios-blue absolute theme-transition"></i>
            </div>
            <p class="text-[20px] md:text-[22px] font-extrabold tracking-tight theme-transition" id="loading-text">Processing Document</p>
            <p class="text-[14px] md:text-[15px] font-semibold text-ios-subtext mt-2 theme-transition" id="loading-subtext">Please wait...</p>
        </div>
    </div>

    <!-- Modals -->
    <div id="custom-modal" class="overlay fixed inset-0 bg-black/30 dark:bg-black/80 items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="liquid-glass rounded-[32px] w-[320px] md:w-[360px] overflow-hidden transform scale-90 transition-transform duration-300 ease-spring" id="custom-modal-content">
            <div class="p-6 md:p-8 text-center">
                <h3 class="text-[20px] md:text-[22px] font-extrabold mb-2 md:mb-3 tracking-tight text-ios-text dark:text-white theme-transition" id="modal-title">Title</h3>
                <p class="text-[14px] md:text-[15px] text-ios-subtext dark:text-gray-300 font-medium theme-transition" id="modal-message">Message details go here.</p>
                <input type="text" id="modal-input" class="hidden w-full mt-6 bg-black/5 dark:bg-white/10 border-none rounded-2xl px-5 py-4 text-[16px] font-semibold text-ios-text dark:text-white outline-none focus:ring-2 focus:ring-ios-blue theme-transition" placeholder="Enter name">
                
                <div id="modal-templates" class="hidden grid-cols-2 gap-3 mt-6">
                    <button onclick="window.addBlankPage('blank')" class="p-4 md:p-5 bg-white/50 dark:bg-white/5 rounded-2xl hover:bg-black/5 dark:hover:bg-white/10 font-bold text-[14px] flex flex-col items-center spring-btn text-ios-text dark:text-white theme-transition">
                        <i data-lucide="file" class="w-6 h-6 md:w-7 md:h-7 mb-3 text-ios-blue"></i>Blank
                    </button>
                    <button onclick="window.addBlankPage('ruled')" class="p-4 md:p-5 bg-ios-blue/10 dark:bg-ios-darkBlue/20 rounded-2xl hover:bg-ios-blue/20 font-bold text-[14px] flex flex-col items-center spring-btn text-ios-blue theme-transition">
                        <i data-lucide="align-justify" class="w-6 h-6 md:w-7 md:h-7 mb-3"></i>Ruled
                    </button>
                    <button onclick="window.addBlankPage('grid')" class="p-4 md:p-5 bg-white/50 dark:bg-white/5 rounded-2xl hover:bg-black/5 dark:hover:bg-white/10 font-bold text-[14px] flex flex-col items-center spring-btn text-ios-text dark:text-white theme-transition">
                        <i data-lucide="grid" class="w-6 h-6 md:w-7 md:h-7 mb-3 text-ios-blue"></i>Grid
                    </button>
                    <button onclick="window.addBlankPage('dotted')" class="p-4 md:p-5 bg-white/50 dark:bg-white/5 rounded-2xl hover:bg-black/5 dark:hover:bg-white/10 font-bold text-[14px] flex flex-col items-center spring-btn text-ios-text dark:text-white theme-transition">
                        <i data-lucide="more-horizontal" class="w-6 h-6 md:w-7 md:h-7 mb-3 text-ios-blue"></i>Dotted
                    </button>
                </div>
            </div>
            <div id="modal-actions" class="flex border-t border-black/10 dark:border-white/10 bg-white/30 dark:bg-white/5 theme-transition">
                <button onclick="window.closeModal()" class="flex-1 py-4 md:py-5 text-ios-blue dark:text-ios-darkBlue font-semibold hover:bg-black/5 dark:hover:bg-white/5 text-[16px] md:text-[17px] theme-transition">Cancel</button>
                <div class="w-px bg-black/10 dark:bg-white/10 theme-transition"></div>
                <button id="modal-confirm-btn" class="flex-1 py-4 md:py-5 font-bold text-ios-blue dark:text-ios-darkBlue hover:bg-black/5 dark:hover:bg-white/5 text-[16px] md:text-[17px] theme-transition">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Advanced Export Modal -->
    <div id="export-modal" class="overlay fixed inset-0 bg-black/30 dark:bg-black/80 items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="liquid-glass rounded-[32px] w-[320px] md:w-[400px] overflow-hidden transform scale-90 transition-transform duration-300 ease-spring" id="export-modal-content">
            <div class="p-6 md:p-8">
                <h3 class="text-[20px] md:text-[22px] font-extrabold mb-2 tracking-tight text-ios-text dark:text-white theme-transition text-center">Export Notebook</h3>
                <p class="text-[14px] md:text-[15px] text-ios-subtext dark:text-gray-300 font-medium theme-transition text-center mb-6">Choose your export format.</p>
                
                <div class="space-y-3">
                    <button onclick="window.exportToPDF()" class="w-full flex items-center p-4 bg-white/50 dark:bg-white/5 border border-black/5 dark:border-white/5 rounded-2xl hover:bg-black/5 dark:hover:bg-white/10 font-bold text-[15px] spring-btn text-ios-text dark:text-white theme-transition text-left">
                        <div class="bg-red-500/10 p-2 rounded-lg mr-4"><i data-lucide="file-text" class="w-6 h-6 text-red-500"></i></div>
                        <div><span class="block">PDF Document</span><span class="block text-[12px] text-ios-subtext font-normal mt-0.5">Best for printing or sharing.</span></div>
                    </button>
                    <button onclick="window.exportCurrentPagePNG()" class="w-full flex items-center p-4 bg-white/50 dark:bg-white/5 border border-black/5 dark:border-white/5 rounded-2xl hover:bg-black/5 dark:hover:bg-white/10 font-bold text-[15px] spring-btn text-ios-text dark:text-white theme-transition text-left">
                        <div class="bg-blue-500/10 p-2 rounded-lg mr-4"><i data-lucide="image" class="w-6 h-6 text-ios-blue"></i></div>
                        <div><span class="block">Image (PNG)</span><span class="block text-[12px] text-ios-subtext font-normal mt-0.5">Export the current active page.</span></div>
                    </button>
                    <button onclick="window.exportNativeBackup()" class="w-full flex items-center p-4 bg-ios-blue/10 dark:bg-ios-blue/20 border border-ios-blue/20 rounded-2xl hover:bg-ios-blue/20 font-bold text-[15px] spring-btn text-ios-blue theme-transition text-left">
                        <div class="bg-ios-blue/20 p-2 rounded-lg mr-4"><i data-lucide="database" class="w-6 h-6 text-ios-blue"></i></div>
                        <div><span class="block">GreatNotes Backup (.gn)</span><span class="block text-[12px] text-ios-subtext font-normal mt-0.5">Keeps all ink editable.</span></div>
                    </button>
                </div>
            </div>
            <div class="flex border-t border-black/10 dark:border-white/10 bg-white/30 dark:bg-white/5 theme-transition">
                <button onclick="window.closeExportMenu()" class="flex-1 py-4 md:py-5 font-bold text-ios-subtext hover:bg-black/5 dark:hover:bg-white/5 text-[16px] md:text-[17px] theme-transition">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Page Settings Modal -->
    <div id="page-settings-modal" class="overlay fixed inset-0 bg-black/30 dark:bg-black/80 items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="liquid-glass rounded-[32px] w-[320px] md:w-[380px] overflow-hidden transform scale-90 transition-transform duration-300 ease-spring" id="page-settings-content">
            <div class="p-6 md:p-8">
                <h3 class="text-[20px] md:text-[22px] font-extrabold mb-4 tracking-tight text-ios-text dark:text-white theme-transition text-center">Page Settings</h3>
                
                <p class="text-[13px] font-bold text-ios-subtext uppercase tracking-wider mb-3">Paper Template</p>
                <div class="grid grid-cols-2 gap-3 mb-6">
                    <button onclick="window.changePageTemplate('blank')" class="p-4 bg-white/50 dark:bg-white/5 border border-black/5 dark:border-white/5 rounded-xl hover:bg-black/5 dark:hover:bg-white/10 font-bold text-[14px] flex flex-col items-center spring-btn text-ios-text dark:text-white theme-transition"><i data-lucide="file" class="w-6 h-6 mb-2 text-ios-blue"></i>Blank</button>
                    <button onclick="window.changePageTemplate('ruled')" class="p-4 bg-white/50 dark:bg-white/5 border border-black/5 dark:border-white/5 rounded-xl hover:bg-black/5 dark:hover:bg-white/10 font-bold text-[14px] flex flex-col items-center spring-btn text-ios-text dark:text-white theme-transition"><i data-lucide="align-justify" class="w-6 h-6 mb-2 text-ios-blue"></i>Ruled</button>
                    <button onclick="window.changePageTemplate('grid')" class="p-4 bg-white/50 dark:bg-white/5 border border-black/5 dark:border-white/5 rounded-xl hover:bg-black/5 dark:hover:bg-white/10 font-bold text-[14px] flex flex-col items-center spring-btn text-ios-text dark:text-white theme-transition"><i data-lucide="grid" class="w-6 h-6 mb-2 text-ios-blue"></i>Grid</button>
                    <button onclick="window.changePageTemplate('dotted')" class="p-4 bg-white/50 dark:bg-white/5 border border-black/5 dark:border-white/5 rounded-xl hover:bg-black/5 dark:hover:bg-white/10 font-bold text-[14px] flex flex-col items-center spring-btn text-ios-text dark:text-white theme-transition"><i data-lucide="more-horizontal" class="w-6 h-6 mb-2 text-ios-blue"></i>Dotted</button>
                </div>

                <p class="text-[13px] font-bold text-ios-subtext uppercase tracking-wider mb-3">Paper Color</p>
                <div class="flex space-x-3">
                    <button onclick="window.togglePageTheme('light')" class="flex-1 p-3 bg-white border-2 border-black/10 rounded-xl font-bold text-black flex items-center justify-center spring-btn">Light</button>
                    <button onclick="window.togglePageTheme('dark')" class="flex-1 p-3 bg-[#1C1C1E] border-2 border-white/10 rounded-xl font-bold text-white flex items-center justify-center spring-btn">Dark</button>
                    <button onclick="window.togglePageTheme('auto')" class="flex-1 p-3 bg-gradient-to-br from-white to-gray-800 border-2 border-ios-blue rounded-xl font-bold text-white text-shadow flex items-center justify-center spring-btn text-[14px]">Auto</button>
                </div>
            </div>
            <div class="flex border-t border-black/10 dark:border-white/10 bg-white/30 dark:bg-white/5 theme-transition">
                <button onclick="window.closePageSettingsModal()" class="flex-1 py-4 md:py-5 font-bold text-ios-blue hover:bg-black/5 dark:hover:bg-white/5 text-[16px] md:text-[17px] theme-transition">Done</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="gesture-toast" class="fixed top-20 md:top-24 left-1/2 transform -translate-x-1/2 z-[20000] liquid-glass px-5 py-2.5 md:px-6 md:py-3 rounded-full opacity-0 pointer-events-none scale-90 flex items-center shadow-2xl transition-all duration-300">
        <i id="toast-icon" data-lucide="info" class="w-4 h-4 md:w-5 md:h-5 mr-2.5 text-ios-text dark:text-white theme-transition"></i>
        <span id="toast-text" class="text-[14px] md:text-[16px] font-extrabold tracking-tight text-ios-text dark:text-white theme-transition">Action</span>
    </div>

    <!-- MAIN APP STRUCTURE -->
    <div id="app" class="flex h-screen w-full relative overflow-hidden bg-transparent">
        
        <!-- ==================== LIBRARY VIEW ==================== -->
        <div id="library-view" class="flex h-full w-full absolute inset-0 z-40 spatial-transition transform-gpu">
            
            <!-- Library Sidebar -->
            <div class="w-[260px] md:w-[300px] liquid-glass-heavy border-r border-black/5 dark:border-white/10 flex flex-col h-full shrink-0 z-[110] pt-12 md:pt-16 shadow-2xl theme-transition">
                <div class="px-6 md:px-8 pb-8">
                    <div class="flex items-center mb-8 md:mb-10">

    <!-- MAIN JAVASCRIPT ENGINE -->
    <script>
        // --- 100% Offline Local Storage Engine (IndexedDB) ---
        const DB_NAME = 'GreatNotesOfflineDB';
        const DB_VERSION = 1;
        const STORE_NAME = 'notebooks';
        let localDB = null;

        function initLocalDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = (e) => reject(e.target.error);
                request.onsuccess = (e) => { 
                    localDB = e.target.result; 
                    resolve(localDB); 
                };
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                    }
                };
            });
        }

        async function loadNotebooksFromLocal() {
            if (!localDB) await initLocalDB();
            return new Promise((resolve, reject) => {
                const tx = localDB.transaction(STORE_NAME, 'readonly');
                const store = tx.objectStore(STORE_NAME);
                const request = store.getAll();
                
                request.onsuccess = () => {
                    let loaded = request.result || [];
                    
                    if (loaded.length === 0 && notebooks.length === 0) {
                        const mockNb1 = { 
                            id: 'nb_' + Date.now(), 
                            title: 'Welcome to GreatNotes', 
                            cover: COVERS[0], 
                            isFavorite: true, 
                            isTrashed: false, 
                            updatedAt: Date.now(), 
                            pages: [{ id: 'p1', paths: [], redoPaths: [], paperType: 'grid', bgImage: null, width: PAGE_WIDTH, height: 1100 }] 
                        };
                        saveNotebook(mockNb1);
                        loaded = [mockNb1];
                    }

                    notebooks = loaded.sort((a, b) => b.updatedAt - a.updatedAt);
                    
                    if (view === 'library') {
                        renderLibrary();
                    } else if (view === 'document' && activeTabId) {
                        if (!notebooks.find(n => n.id === activeTabId)) {
                            setView('library');
                        }
                    }
                    resolve();
                };
                request.onerror = () => {
                    showToast("Storage Load Error", "alert-triangle");
                    reject(request.error);
                };
            });
        }

        async function saveNotebook(nb) {
            nb.updatedAt = Date.now();
            setSyncing(true);
            if (!localDB) await initLocalDB();
            
            return new Promise((resolve, reject) => {
                const tx = localDB.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                const request = store.put(nb);
                
                request.onsuccess = () => { 
                    setSyncing(false); 
                    resolve(); 
                };
                request.onerror = () => { 
                    showToast("Save failed", "alert-circle"); 
                    setSyncing(false); 
                    reject(request.error); 
                };
            });
        }

        async function deleteNotebook(id) {
            if (!localDB) await initLocalDB();
            return new Promise((resolve, reject) => {
                const tx = localDB.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                const request = store.delete(id);
                
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        // --- External Libraries ---
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        // --- Constants & Config ---

        // --- Interaction & Import Tracking ---
        function setupGlobalDragAndDrop() {
            const dropzone = document.getElementById('global-dropzone');
            let dragCounter = 0;

            window.addEventListener('dragenter', (e) => {
                e.preventDefault();
                dragCounter++;
                dropzone.classList.add('drag-active');
            });

            window.addEventListener('dragover', (e) => {
                e.preventDefault();
            });

            window.addEventListener('dragleave', (e) => {
                dragCounter--;
                if (dragCounter === 0) {
                    dropzone.classList.remove('drag-active');
                }
            });

            window.addEventListener('drop', (e) => {
                e.preventDefault();
                dragCounter = 0;
                dropzone.classList.remove('drag-active');

                if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                    handleFileUpload({ target: { files: [e.dataTransfer.files[0]] } });
                }
            });
        }

        function handleFileUpload(e) {
            const file = e.target ? e.target.files[0] : null;
            if (!file) return;

            if (file.name.endsWith('.gn')) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const nb = JSON.parse(ev.target.result);
                        nb.id = Date.now().toString(); 
                        notebooks.unshift(nb);
                        saveNotebook(nb);
                        setLibraryFilter('all');
                        openNotebook(nb.id);
                        showToast("Backup Restored", "check-circle");
                    } catch (err) {
                        showToast("Invalid Backup File", "alert-triangle");
                    }
                };
                reader.readAsText(file);
            } 
            else if (file.type === "application/pdf") {
                handlePdfUpload(file);
            } 
            else if (file.type.startsWith('image/')) {
                if (view === 'document') {
                    handleImageInsert(file);
                } else {
                    showToast("Open a note to drop images", "image");
                }
            } 
            else {
                showToast("Unsupported file type", "alert-circle");
            }
            
            if(e.target) e.target.value = '';
        }

        function handleImageInsert(file) {
            if (!file) return;
            const nb = notebooks.find(n => n.id === activeTabId);
            if (!nb) return;
            const currentIndex = getCurrentPageIndex();
            const page = nb.pages[currentIndex];
            if (!page) return;

            showLoading("Inserting Image", "Optimizing asset...");

            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    // Downscale image to prevent local storage quota limit crash
                    const maxDim = 800;
                    let scaleImg = 1.0;
                    if (img.width > maxDim || img.height > maxDim) {
                        scaleImg = Math.min(maxDim / img.width, maxDim / img.height);
                    }
                    const dw = img.width * scaleImg;
                    const dh = img.height * scaleImg;
                    
                    const dCanvas = document.createElement('canvas');
                    dCanvas.width = dw; dCanvas.height = dh;
                    const dCtx = dCanvas.getContext('2d');
                    dCtx.drawImage(img, 0, 0, dw, dh);
                    const compressedData = dCanvas.toDataURL('image/jpeg', 0.6);

                    const maxWidth = page.width * 0.8;
                    const renderScale = dw > maxWidth ? maxWidth / dw : 1.0;
                    const w = dw * renderScale;
                    const h = dh * renderScale;
                    
                    page.paths.push({ tool: 'image', src: compressedData, x: (page.width - w) / 2, y: (page.height - h) / 2, w: w, h: h });
                    page.redoPaths = []; 
                    
                    // Select the image immediately
                    selectedImage = { pageIndex: currentIndex, pathIndex: page.paths.length - 1 };
                    setTool('pan');
                    
                    saveNotebook(nb);
                    redrawPage(currentIndex); 
                    updateUndoRedoUI(); 
                    hideLoading();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function handlePdfUpload(file) {
            if (!file || file.type !== "application/pdf") return;
            
            showLoading("Importing PDF", "Mapping vector layers...");
            
            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                const totalPages = pdf.numPages;
                const newPages = [];
                
                const nbId = Date.now().toString();
                pdfDocumentCache.set(nbId, pdf); 
                
                for (let i = 1; i <= totalPages; i++) {
                    const subEl = document.getElementById('loading-subtext');
                    if(subEl) subEl.innerText = `Registering Page ${i} of ${totalPages}`;
                    if (i % 5 === 0) await new Promise(resolve => requestAnimationFrame(resolve));
                    
                    const page = await pdf.getPage(i);
                    const rawViewport = page.getViewport({ scale: 1.0 });
                    const scaleFactor = PAGE_WIDTH / rawViewport.width;
                    const viewport = page.getViewport({ scale: scaleFactor });
                    
                    // Generate Tiny Thumbnail for Storage (Scale to 80px)
                    const thumbScale = 80 / rawViewport.width;
                    const thumbViewport = page.getViewport({ scale: thumbScale });
                    const thumbCanvas = document.createElement('canvas');
                    thumbCanvas.width = thumbViewport.width;
                    thumbCanvas.height = thumbViewport.height;
                    const thumbCtx = thumbCanvas.getContext('2d');
                    await page.render({ canvasContext: thumbCtx, viewport: thumbViewport }).promise;
                    const thumbData = thumbCanvas.toDataURL('image/jpeg', 0.2);

                    newPages.push({
                        id: `page_${Date.now()}_${i}`,
                        paths: [], redoPaths: [], paperType: 'pdf',
                        pdfPageIndex: i, 
                        thumbData: thumbData,
                        width: viewport.width, height: viewport.height 
                    });
                }
                
                const newNb = {
                    id: nbId, title: file.name.replace('.pdf', ''),
                    cover: COVERS[notebooks.length % COVERS.length],
                    isFavorite: false, isTrashed: false,
                    updatedAt: Date.now(),
                    pages: newPages
                };
                notebooks.unshift(newNb);
                saveNotebook(newNb);
                setLibraryFilter('all');
                openNotebook(nbId);
            } catch (err) {
                console.error("PDF Import Error:", err);
                showModal("Import Failed", "This PDF could not be processed.", "OK", false, ()=>{});
            } finally {
                hideLoading();
            }
        }

        function setupPinchToZoom() {
            const viewport = document.getElementById('canvas-viewport');
            let initialZoom = 1.0;
            let rafId = null;

            viewport.addEventListener('gesturestart', (e) => {
                e.preventDefault();
                initialZoom = zoomLevel;
            });

            viewport.addEventListener('gesturechange', (e) => {
                e.preventDefault();
                if (rafId) cancelAnimationFrame(rafId);
                rafId = requestAnimationFrame(() => {
                    let newZoom = initialZoom * e.scale;
                    newZoom = Math.max(0.5, Math.min(newZoom, 4.0));
                    setZoom(newZoom, false);
                });
            });

            viewport.addEventListener('gestureend', (e) => { 
                e.preventDefault(); 
            });
        }

        function getCurrentPageIndex() {
            const viewport = document.getElementById('canvas-viewport');
            const wrappers = document.querySelectorAll('.page-wrapper');
            if (!wrappers || wrappers.length === 0) return 0;
            
            let closestIndex = 0;
            let minDistance = Infinity;
            
            const viewportRect = viewport.getBoundingClientRect();
            const viewportCenterY = viewportRect.top + (viewportRect.height / 2);

            wrappers.forEach((wrapper, index) => {
                const rect = wrapper.getBoundingClientRect();
                const wrapperCenterY = rect.top + (rect.height / 2);
                const distance = Math.abs(viewportCenterY - wrapperCenterY);
                if (distance < minDistance) {
                    minDistance = distance;
                    closestIndex = index;
                }
            });
            
            return closestIndex;
        }

        function updatePageIndicatorUI() {
            const nb = notebooks.find(n => n.id === activeTabId);

            const currentIndex = getCurrentPageIndex();

            indicator.classList.add('opacity-100');
            
            clearTimeout(indicatorTimeout);
            indicatorTimeout = setTimeout(() => {
                indicator.classList.remove('opacity-100');
                indicator.classList.add('opacity-0');
            }, 1800);
        }

        function toggleFocusMode() {
            isFocusMode = !isFocusMode;
            const toolbar = document.getElementById('drawing-toolbar');
            const btnFocus = document.getElementById('btn-focus');
            const iconFocus = document.getElementById('icon-focus');

            if (isFocusMode) {
                toolbar.classList.add('translate-y-[150%]'); 
                btnFocus.classList.replace('bg-ios-blue/10', 'bg-ios-blue'); 
                btnFocus.classList.replace('dark:bg-ios-blue/20', 'bg-ios-blue'); 
                btnFocus.classList.replace('text-ios-blue', 'text-white');
                iconFocus.setAttribute('data-lucide', 'book-open-check'); 
                setTool('pan'); 
                showToast("Focus Mode: On", "book-open");
                if (sidebarOpen) toggleSidebar();
            } else {
                toolbar.classList.remove('translate-y-[150%]'); 
                btnFocus.classList.replace('bg-ios-blue', 'bg-ios-blue/10'); 
                btnFocus.classList.replace('bg-ios-blue', 'dark:bg-ios-blue/20'); 
                btnFocus.classList.replace('text-white', 'text-ios-blue');
                iconFocus.setAttribute('data-lucide', 'book-open'); 
                setTool('pen'); 
                showToast("Focus Mode: Off", "pen-tool");
            }
            lucide.createIcons();
        }

        // --- Library Logic ---
        function setLibraryFilter(filter) {
            libraryFilter = filter;
            ['all', 'favorites', 'trash'].forEach(f => {
                const btn = document.getElementById(`nav-${f}`);
                if(f === filter) { 
                    btn.classList.add('bg-ios-blue/10', 'dark:bg-ios-blue/20', 'text-ios-blue'); 
                    btn.classList.remove('text-ios-subtext', 'hover:bg-black/5', 'dark:hover:bg-white/5'); 
                } else { 
                    btn.classList.remove('bg-ios-blue/10', 'dark:bg-ios-blue/20', 'text-ios-blue'); 
                    btn.classList.add('text-ios-subtext', 'hover:bg-black/5', 'dark:hover:bg-white/5'); 
                }
            });
            document.getElementById('library-title').innerText = { 'all': 'All Notes', 'favorites': 'Favorites', 'trash': 'Trash' }[filter];
            renderLibrary();
        }

        function renderLibrary() {
            const grid = document.getElementById('notebook-grid'); 
            grid.innerHTML = '';
            
            let filteredNbs = notebooks;
            if (libraryFilter === 'favorites') {
                filteredNbs = notebooks.filter(n => n.isFavorite && !n.isTrashed);
            } else if (libraryFilter === 'trash') {
                filteredNbs = notebooks.filter(n => n.isTrashed);
            } else {
                filteredNbs = notebooks.filter(n => !n.isTrashed);
            }

            if(filteredNbs.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full flex flex-col items-center justify-center pt-32 text-ios-subtext opacity-50 theme-transition">
                        <i data-lucide="${libraryFilter==='trash'?'trash-2':'book-x'}" class="w-20 h-20 md:w-24 md:h-24 mb-6 stroke-[1.5]"></i>
                        <p class="text-xl md:text-2xl font-bold">Nothing here</p>
                    </div>`;
                lucide.createIcons(); 
                return;
            }

            filteredNbs.forEach(nb => {
                const item = document.createElement('div'); 
                item.className = 'flex flex-col items-center cursor-pointer group relative spring-btn';
                if (!nb.isTrashed) {
                    item.onclick = () => openNotebook(nb.id);
                }

                let hoverActions = '';
                if (nb.isTrashed) {
                    hoverActions = `
                        <button onclick="event.stopPropagation(); window.restoreNotebook('${nb.id}')" class="bg-white/95 dark:bg-black/90 p-3 md:p-4 rounded-full text-ios-blue hover:scale-110 transition-transform shadow-xl theme-transition">
                            <i data-lucide="rotate-ccw" class="w-5 h-5 md:w-[24px] md:h-[24px] stroke-[2.5]"></i>
                        </button>
                        <button onclick="event.stopPropagation(); window.requestDeleteNotebook('${nb.id}', '${nb.title}')" class="bg-white/95 dark:bg-black/90 p-3 md:p-4 rounded-full text-red-500 hover:scale-110 transition-transform shadow-xl theme-transition">
                            <i data-lucide="trash-2" class="w-5 h-5 md:w-[24px] md:h-[24px] stroke-[2.5]"></i>
                        </button>`;
                } else {
                    hoverActions = `
                        <button onclick="event.stopPropagation(); window.toggleFavorite('${nb.id}')" class="bg-white/95 dark:bg-black/90 p-3 md:p-4 rounded-full ${nb.isFavorite ? 'text-yellow-500' : 'text-ios-text dark:text-white'} hover:scale-110 transition-transform shadow-xl theme-transition">
                            <i data-lucide="star" class="${nb.isFavorite ? 'fill-yellow-500' : ''} w-5 h-5 md:w-[24px] md:h-[24px] stroke-[2.5] theme-transition"></i>
                        </button>
                        <button onclick="event.stopPropagation(); window.moveToTrash('${nb.id}')" class="bg-white/95 dark:bg-black/90 p-3 md:p-4 rounded-full text-red-500 hover:scale-110 transition-transform shadow-xl theme-transition">
                            <i data-lucide="trash-2" class="w-5 h-5 md:w-[24px] md:h-[24px] stroke-[2.5]"></i>
                        </button>`;
                }

                const bookUI = document.createElement('div');
                bookUI.className = 'w-full aspect-[3/4] book-cover rounded-r-[20px] md:rounded-r-[24px] rounded-l-[6px] md:rounded-l-[8px] flex items-center justify-center relative overflow-hidden';
                bookUI.style.background = nb.cover;
                bookUI.innerHTML = `
                    <div class="book-spine"></div>
                    <div class="bg-white/95 dark:bg-[#1C1C1E]/95 px-4 md:px-5 py-3 md:py-4 rounded-[12px] md:rounded-[14px] shadow-glass dark:shadow-glass-dark w-[85%] md:w-[82%] text-center font-extrabold text-[14px] md:text-[16px] text-ios-text dark:text-white overflow-hidden backdrop-blur-xl z-10 border border-white/60 dark:border-white/10 theme-transition">
                        <span class="truncate block w-full tracking-tight theme-transition">${nb.title}</span>
                    </div>
                    <div class="absolute inset-0 bg-black/30 opacity-0 group-hover:opacity-100 transition-opacity duration-300 z-20 flex items-center justify-center space-x-3 md:space-x-5 backdrop-blur-[2px]">
                        ${hoverActions}
                    </div>`;

                const labelUI = document.createElement('div'); 
                labelUI.className = 'mt-5 md:mt-7 text-center px-1 md:px-2 w-full theme-transition';
                labelUI.innerHTML = `
                    <span class="block text-[15px] md:text-[17px] font-bold truncate w-full tracking-tight text-ios-text dark:text-white flex items-center justify-center theme-transition">
                        ${nb.isFavorite ? '<i data-lucide="star" class="w-3.5 h-3.5 md:w-4 md:h-4 fill-yellow-500 text-yellow-500 mr-1.5 md:mr-2"></i>' : ''} ${nb.title}
                    </span>
                    <span class="text-[13px] md:text-[14px] font-bold text-ios-subtext dark:text-ios-darkSubtext mt-1 md:mt-1.5 block theme-transition">${nb.pages.length} Page${nb.pages.length !== 1 ? 's' : ''}</span>`;

                item.appendChild(bookUI); 
                item.appendChild(labelUI); 
                grid.appendChild(item);
            });
            lucide.createIcons();
        }

        // --- Notebook Handlers ---
        function toggleFavorite(id) { 
            const nb = notebooks.find(n => n.id === id); 
            if(nb) { nb.isFavorite = !nb.isFavorite; saveNotebook(nb); renderLibrary(); }
        }
        function moveToTrash(id) { 
            const nb = notebooks.find(n => n.id === id); 
            if(nb) { nb.isTrashed = true; saveNotebook(nb); renderLibrary(); }
        }
        function restoreNotebook(id) { 
            const nb = notebooks.find(n => n.id === id); 
            if(nb) { nb.isTrashed = false; saveNotebook(nb); renderLibrary(); }
        }
        function openNotebook(id) { 
            activeTabId = id; 
            setView('document'); 
        }

        function requestNewNotebook() {
            showModal("New Notebook", "Name your masterpiece:", "Create", false, (name) => {
                const nbId = Date.now().toString();
                const nb = { 
                    id: nbId, 
                    title: name.trim() || 'Untitled Note', 
                    cover: COVERS[Math.floor(Math.random() * COVERS.length)], 
                    isFavorite: false, 
                    isTrashed: false, 
                    updatedAt: Date.now(),
                    pages: [{ id: `p_${Date.now()}`, paths: [], redoPaths: [], paperType: 'ruled', bgImage: null, width: PAGE_WIDTH, height: 1100 }] 
                };
                notebooks.unshift(nb);
                saveNotebook(nb);
                setLibraryFilter('all'); 
                openNotebook(nbId);
            }, true, "");
        }

        function requestRenameNotebook() {
            const nb = notebooks.find(n => n.id === activeTabId); 
            if(!nb) return;
            showModal("Rename Notebook", "Enter a new name:", "Save", false, (newName) => {
                if(newName.trim()) { 
                    nb.title = newName.trim(); 
                    saveNotebook(nb);
                    document.getElementById('doc-title').innerText = nb.title; 
                }
            }, true, nb.title);
        }

        function requestDeleteNotebook(id, title) {
            showModal("Delete Permanently", `Are you sure you want to permanently delete "${title}"? This cannot be undone.`, "Delete", true, () => {
                notebooks = notebooks.filter(n => n.id !== id);
                deleteNotebook(id);
                if (activeTabId === id) setView('library'); 
                else renderLibrary();
            });
        }

        function requestDeletePage(pageIndex) {
            const nb = notebooks.find(n => n.id === activeTabId);
            if (!nb || nb.pages.length <= 1) { 
                showModal("Cannot Delete", "A notebook requires at least one page.", "OK", false, ()=>{}); 
                return; 
            }
            showModal("Delete Page", `Remove Page ${pageIndex + 1} permanently?`, "Delete", true, () => {
                nb.pages.splice(pageIndex, 1); 
                saveNotebook(nb);
                activePageIndex = Math.max(0, Math.min(pageIndex, nb.pages.length - 1));
                updateDocumentUI(); 
                if(navigator.vibrate) navigator.vibrate(50);
                setTimeout(() => { 
                    const w = document.getElementById(`page-wrapper-${activePageIndex}`); 
                    if (w) w.scrollIntoView({ behavior: 'smooth', block: 'center' }); 
                }, 100);
            });
        }

        function duplicatePage(pageIndex) {
            const nb = notebooks.find(n => n.id === activeTabId); 
            if (!nb) return;
            
            const originalPage = nb.pages[pageIndex];
            const newPage = JSON.parse(JSON.stringify(originalPage)); 
            newPage.id = `p_${Date.now()}`;
            
            nb.pages.splice(pageIndex + 1, 0, newPage); 
            saveNotebook(nb);
            activePageIndex = pageIndex + 1; 
            updateDocumentUI();
            
            setTimeout(() => { 
                const w = document.getElementById(`page-wrapper-${activePageIndex}`); 
                if (w) w.scrollIntoView({ behavior: 'smooth', block: 'center' }); 
            }, 100);
            showToast("Page Duplicated", "copy");
        }

        function movePageUp(pageIndex) {
            if (pageIndex === 0) return; 
            const nb = notebooks.find(n => n.id === activeTabId);
            const temp = nb.pages[pageIndex - 1]; 
            nb.pages[pageIndex - 1] = nb.pages[pageIndex]; 
            nb.pages[pageIndex] = temp;
            
            saveNotebook(nb);
            activePageIndex = pageIndex - 1; 
            updateDocumentUI();
            
            setTimeout(() => { 
                const w = document.getElementById(`page-wrapper-${activePageIndex}`); 
                if (w) w.scrollIntoView({ behavior: 'smooth', block: 'center' }); 
            }, 100);
        }

        function movePageDown(pageIndex) {
            const nb = notebooks.find(n => n.id === activeTabId); 
            if (pageIndex === nb.pages.length - 1) return;
            
            const temp = nb.pages[pageIndex + 1]; 
            nb.pages[pageIndex + 1] = nb.pages[pageIndex]; 
            nb.pages[pageIndex] = temp;
            
            saveNotebook(nb);
            activePageIndex = pageIndex + 1; 
            updateDocumentUI();
            
            setTimeout(() => { 
                const w = document.getElementById(`page-wrapper-${activePageIndex}`); 
                if (w) w.scrollIntoView({ behavior: 'smooth', block: 'center' }); 
            }, 100);
        }

        function requestClearCurrentPage() {
            const nb = notebooks.find(n => n.id === activeTabId); 
            if (!nb) return;
            
            const currentIndex = getCurrentPageIndex(); 
            if (nb.pages[currentIndex].paths.length === 0) return; 

            showModal("Clear Page", `Erase all content from Page ${currentIndex + 1}?`, "Erase", true, () => {
                nb.pages[currentIndex].paths = []; 
                nb.pages[currentIndex].redoPaths = [];
                saveNotebook(nb);
                if (renderedPages.has(currentIndex)) redrawPage(currentIndex);
                updateUndoRedoUI(); 
                if(navigator.vibrate) navigator.vibrate(50);
            });
        }

        function requestAddPage() { 
            showModal("Add Page", "Select a template to insert after the current page:", "Add", false, () => {}, false, "", true); 
            lucide.createIcons(); 
        }

        function addBlankPage(type = 'ruled') {
            const nb = notebooks.find(n => n.id === activeTabId); 
            if (!nb) return;
            
            const currentIndex = getCurrentPageIndex();
            const insertIndex = currentIndex + 1;
            const refPage = nb.pages[currentIndex];
            
            nb.pages.splice(insertIndex, 0, { 
                id: `p_${Date.now()}`, 
                paths: [], 
                redoPaths: [], 
                paperType: type, 
                bgImage: null, 
                width: refPage ? refPage.width : PAGE_WIDTH, 
                height: refPage ? refPage.height : 1100 
            });
            
            saveNotebook(nb);
            activePageIndex = insertIndex; 
            updateDocumentUI();

            setTimeout(() => { 
                const w = document.getElementById(`page-wrapper-${insertIndex}`); 
                if (w) { 
                    w.scrollIntoView({ behavior: 'smooth', block: 'center' }); 
                    highlightThumbnail(insertIndex); 
                } 
            }, 100);

            closeModal();
        }

        function changePageTemplate(type) {
            const nb = notebooks.find(n => n.id === activeTabId); 
            if (!nb) return;
            
            const currentIndex = getCurrentPageIndex();
            nb.pages[currentIndex].paperType = type;
            saveNotebook(nb);
            redrawPage(currentIndex);
            closePageSettingsModal();
            showToast("Template Changed", "file-edit");
        }

        // --- Undo / Redo Engine ---
        function updateUndoRedoUI() {
            const nb = notebooks.find(n => n.id === activeTabId); 
            if (!nb) return; 
            
            const page = nb.pages[getCurrentPageIndex()];
            const btnUndo = document.getElementById('btn-undo');
            const btnRedo = document.getElementById('btn-redo');

            if (page && page.paths.length > 0) { 
                btnUndo.classList.remove('opacity-50'); 
                btnUndo.removeAttribute('disabled'); 
            } else { 
                btnUndo.classList.add('opacity-50'); 
                btnUndo.setAttribute('disabled', 'true'); 
            }

            if (page && page.redoPaths && page.redoPaths.length > 0) { 
                btnRedo.classList.remove('opacity-50'); 
                btnRedo.removeAttribute('disabled'); 
            } else { 
                btnRedo.classList.add('opacity-50'); 
                btnRedo.setAttribute('disabled', 'true'); 
            }
        }

        function undoLastStroke() { 
            const nb = notebooks.find(n => n.id === activeTabId); 
            if (!nb) return; 
            const currentIndex = getCurrentPageIndex(); 
            const page = nb.pages[currentIndex]; 
            
            if (page && page.paths.length > 0) { 
                page.redoPaths = page.redoPaths || []; 
                page.redoPaths.push(page.paths.pop()); 
                saveNotebook(nb);
                if (renderedPages.has(currentIndex)) redrawPage(currentIndex); 
                showToast("Undo", "undo-2"); 
                updateUndoRedoUI(); 
            } 
        }

        function redoLastStroke() { 
            const nb = notebooks.find(n => n.id === activeTabId); 
            if (!nb) return; 
            const currentIndex = getCurrentPageIndex(); 
            const page = nb.pages[currentIndex]; 
            
            if (page && page.redoPaths && page.redoPaths.length > 0) { 
                page.paths.push(page.redoPaths.pop()); 
                saveNotebook(nb);
                if (renderedPages.has(currentIndex)) redrawPage(currentIndex); 
                showToast("Redo", "redo-2"); 
                updateUndoRedoUI(); 
            } 
        }

        // --- Toolbar & Tools Engine ---
        function toggleStylusMode() {
            stylusOnlyMode = !stylusOnlyMode;
            updateStylusModeUI();
        }

        function updateStylusModeUI() {
            const btn = document.getElementById('btn-stylus-mode');
            if (stylusOnlyMode) {
                btn.className = 'p-2.5 md:p-3.5 rounded-full transition-colors spring-btn bg-ios-blue text-white shadow-xl shadow-ios-blue/30 flex-shrink-0 theme-transition';
            } else {
                btn.className = 'p-2.5 md:p-3.5 rounded-full transition-colors spring-btn bg-black/5 dark:bg-white/10 text-ios-text dark:text-white hover:bg-black/10 dark:hover:bg-white/20 flex-shrink-0 theme-transition';
            }
        }

        function preventScrollIfDrawing(e) {
            if (currentTool === 'pan') return; 
            if (e.touches && e.touches.length >= 2) return; 
            if (stylusOnlyMode) {
                if (e.touches) {
                    let isFinger = Array.from(e.touches).some(t => t.touchType !== 'stylus');
                    if (isFinger) return;
                }
            }
            if(e.cancelable) e.preventDefault(); 
        }

        function adjustZoom(delta) {
            let newZoom = zoomLevel + delta;
            newZoom = Math.max(0.5, Math.min(newZoom, 4.0)); 
            setZoom(newZoom, true);
        }

        function setZoom(level, animate = false) {
            zoomLevel = level;
            document.getElementById('zoom-text').innerText = `${Math.round(zoomLevel * 100)}%`;
            
            const nb = notebooks.find(n => n.id === activeTabId);
            if (!nb) return;
            
            nb.pages.forEach((page, index) => {
                const wrapper = document.getElementById(`page-wrapper-${index}`);
                if (wrapper) {
                    if (animate) {
                        wrapper.style.transition = 'width 0.3s cubic-bezier(0.25, 1, 0.5, 1), height 0.3s cubic-bezier(0.25, 1, 0.5, 1), background-color 0.4s ease';
                    } else {
                        wrapper.style.transition = 'background-color 0.4s ease';
                    }
                    wrapper.style.width = `${page.width * zoomLevel}px`;
                    wrapper.style.height = `${page.height * zoomLevel}px`;
                }
            });
        }

        function setTool(tool) {
            currentTool = tool;
            selectedImage = null; 
            renderedPages.forEach(idx => redrawPage(idx)); 
            
            if (['pen', 'line', 'laser'].includes(tool)) { 
                if (!PALETTES.pen.includes(activeColor)) activeColor = PALETTES.pen[0]; 
                if (!SIZES.pen.includes(activeSize)) activeSize = SIZES.pen[1]; 
            } else if (tool === 'highlighter') { 
                if (!PALETTES.highlighter.includes(activeColor)) activeColor = PALETTES.highlighter[0]; 
                if (!SIZES.highlighter.includes(activeSize)) activeSize = SIZES.highlighter[1]; 
            } else if (tool === 'eraser') { 
                activeSize = SIZES.eraser[1]; 
            }
            
            updateToolbar();
            
            document.querySelectorAll('[id^="active-canvas-"]').forEach(canvas => {
                if (tool === 'eraser') canvas.style.cursor = 'cell'; 
                else if (tool === 'pan') canvas.style.cursor = 'grab'; 
                else canvas.style.cursor = 'crosshair';
            });
        }

        function setupColorPicker() {
            const picker = document.getElementById('native-color-picker');
            picker.addEventListener('input', (e) => {
                activeColor = e.target.value;
                if (['pen', 'line', 'laser'].includes(currentTool)) { 
                    if (!PALETTES.pen.includes(activeColor)) { 
                        if (PALETTES.pen.length >= 5) PALETTES.pen.pop(); 
                        PALETTES.pen.unshift(activeColor); 
                    } 
                } else if (currentTool === 'highlighter') { 
                    if (!PALETTES.highlighter.includes(activeColor)) { 
                        if (PALETTES.highlighter.length >= 5) PALETTES.highlighter.pop(); 
                        PALETTES.highlighter.unshift(activeColor); 
                    } 
                }
                updateToolbar();
            });
        }

        function updateToolbar() {
            ['pan', 'pen', 'highlighter', 'line', 'eraser', 'laser'].forEach(t => {
                const btn = document.getElementById(`tool-${t}`); 
                if (!btn) return;
                const icon = btn.querySelector('svg') || btn.querySelector('i');
                if (t === currentTool) { 
                    btn.classList.add('active', 'text-ios-blue', 'bg-white', 'dark:bg-white/20', 'shadow-md'); 
                    btn.classList.remove('text-gray-500'); 
                    if(icon) icon.classList.replace('stroke-[2]', 'stroke-[2.5]'); 
                } else { 
                    btn.classList.remove('active', 'text-ios-blue', 'bg-white', 'dark:bg-white/20', 'shadow-md'); 
                    btn.classList.add('text-gray-500', 'hover:bg-black/5', 'dark:hover:bg-white/10'); 
                    if(icon) icon.classList.replace('stroke-[2.5]', 'stroke-[2]'); 
                }
            });

            const configAreas = document.querySelectorAll('.tool-config-area');
            if (currentTool === 'pan') { 
                configAreas.forEach(a => { a.style.opacity = '0.3'; a.style.pointerEvents = 'none'; }); 
            } else { 
                configAreas.forEach(a => { a.style.opacity = '1'; a.style.pointerEvents = 'auto'; }); 
            }

            const cc = document.getElementById('color-palette'); 
            cc.innerHTML = '';
            
            if (currentTool !== 'eraser' && currentTool !== 'pan') {
                const colors = currentTool === 'highlighter' ? PALETTES.highlighter : PALETTES.pen;
                colors.forEach(color => {
                    const b = document.createElement('button'); 
                    b.onclick = () => { activeColor = color; updateToolbar(); };
                    const rc = isDarkMode ? 'outline-white border-black/50' : 'outline-ios-blue border-white';
                    const ac = `scale-[1.25] shadow-[0_4px_12px_rgba(0,0,0,0.15)] dark:shadow-[0_4px_12px_rgba(0,0,0,0.5)] border-[3px] outline outline-2 outline-offset-2 ${rc}`;
                    const ic = isDarkMode ? 'border border-white/20' : 'border border-black/10';
                    b.className = `w-6 h-6 md:w-[32px] md:h-[32px] rounded-full transition-all duration-300 spring-btn flex-shrink-0 ${color === activeColor ? ac : ic}`;
                    b.style.backgroundColor = color; 
                    if(isDarkMode && color.toUpperCase() === '#1C1C1E') b.style.border = '1px solid rgba(255,255,255,0.4)';
                    cc.appendChild(b);
                });
            }

            const sc = document.getElementById('size-palette'); 
            sc.innerHTML = '';
            
            const sizes = ['pen', 'line', 'laser'].includes(currentTool) ? SIZES.pen : currentTool === 'highlighter' ? SIZES.highlighter : SIZES.eraser;
            sizes.forEach(size => {
                const b = document.createElement('button'); 
                b.onclick = () => { activeSize = size; updateToolbar(); };
                const ac = isDarkMode ? 'bg-white/20 shadow-inner scale-110' : 'bg-black/10 shadow-inner scale-110';
                const ic = isDarkMode ? 'hover:bg-white/10' : 'hover:bg-black/5 hover:scale-110';
                b.className = `w-7 h-7 md:w-[46px] md:h-[46px] flex flex-shrink-0 items-center justify-center rounded-full transition-all spring-btn ${size === activeSize ? ac : ic}`;
                const vs = currentTool === 'eraser' ? size / 2 : size; 
                const dc = currentTool === 'eraser' ? (isDarkMode ? 'border border-gray-500 bg-transparent' : 'border border-gray-400 bg-white') : (isDarkMode ? 'bg-gray-200' : 'bg-gray-800');
                b.innerHTML = `<div class="rounded-full ${dc} transition-colors duration-700" style="width: ${vs * 0.8}px; height: ${vs * 0.8}px"></div>`;
                sc.appendChild(b);
            });
        }

        // --- Virtualization Engine ---
        function updateDocumentUI() {
            const nb = notebooks.find(n => n.id === activeTabId); 
            if(nb) document.getElementById('doc-title').innerText = nb.title;
            
            updateToolbar(); 
            buildContinuousDocument(); 
            renderSidebarThumbnails(); 
            updatePageIndicatorUI(); 
            updateUndoRedoUI(); 
            lucide.createIcons(); 
        }

        function renderSidebarThumbnails() {
            const container = document.getElementById('sidebar-thumbnails'); 
            container.innerHTML = '';
            const nb = notebooks.find(n => n.id === activeTabId); 
            if (!nb) return;

            nb.pages.forEach((p, idx) => {
                const thumbItem = document.createElement('div'); 
                thumbItem.className = 'flex flex-col items-center group relative spring-btn';
                
                const controlUI = document.createElement('div'); 
                controlUI.className = 'absolute -top-3 -right-3 md:-right-6 z-20 flex flex-col space-y-1 opacity-0 group-hover:opacity-100 transition-all';
                controlUI.innerHTML = `
                    <button onclick="event.stopPropagation(); window.requestDeletePage(${idx})" class="bg-white dark:bg-[#2C2C2E] shadow-glass dark:shadow-glass-dark p-2 md:p-2.5 rounded-full text-red-500 hover:bg-red-50 dark:hover:bg-red-500/20 hover:scale-110 transition-all"><i data-lucide="trash-2" class="w-3.5 h-3.5 md:w-[14px] md:h-[14px] stroke-[2.5]"></i></button>

                if(idx > 0) reorderUI.innerHTML += `<button onclick="event.stopPropagation(); window.movePageUp(${idx})" class="bg-white dark:bg-[#2C2C2E] shadow-glass dark:shadow-glass-dark p-1.5 md:p-2 rounded-full text-ios-text dark:text-white hover:bg-black/5 dark:hover:bg-white/10 hover:scale-110 transition-all"><i data-lucide="chevron-up" class="w-3.5 h-3.5 md:w-[14px] md:h-[14px] stroke-[3]"></i></button>`;
                if(idx < nb.pages.length - 1) reorderUI.innerHTML += `<button onclick="event.stopPropagation(); window.movePageDown(${idx})" class="bg-white dark:bg-[#2C2C2E] shadow-glass dark:shadow-glass-dark p-1.5 md:p-2 rounded-full text-ios-text dark:text-white hover:bg-black/5 dark:hover:bg-white/10 hover:scale-110 transition-all mt-1"><i data-lucide="chevron-down" class="w-3.5 h-3.5 md:w-[14px] md:h-[14px] stroke-[3]"></i></button>`;
                
                const thumbClickArea = document.createElement('div');

                thumbClickArea.onclick = () => {

                let content = '';
                if (p.paperType === 'pdf' && p.thumbData) {
                    content = `<img src="${p.thumbData}" class="w-full h-full object-contain bg-white" loading="lazy" />`;
                } else if (p.bgImage) {

                } else if (p.paperType === 'pdf') {
                    content = `<div class="w-full h-full flex flex-col items-center justify-center text-ios-blue opacity-50 bg-white"><i data-lucide="file-text" class="w-6 h-6 md:w-8 md:h-8 mb-1"></i></div>`;
                } else {
                    content = `<span class="text-gray-200 font-serif text-3xl font-bold">${idx + 1}</span>`;
